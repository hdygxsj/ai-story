name: Desktop Windows Build

on:
  push:
    branches: [master, main]
    tags:
      - "v*"
      - "desktop-v*"
      - "*.*.*"
    paths:
      - "desktop/**"
      - "scripts/prepare-desktop-stack.mjs"
      - "scripts/docker-env/**"
      - "docker-compose.yml"
      - ".env.example"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/desktop-windows.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "scripts/prepare-desktop-stack.mjs"
      - "scripts/docker-env/**"
      - "docker-compose.yml"
      - ".env.example"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/desktop-windows.yml"
  workflow_dispatch:

jobs:
  build-windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Prepare stack bundle
        run: node scripts/prepare-desktop-stack.mjs

      - name: Build Windows installer
        working-directory: desktop
        run: npm run tauri build -- --bundles nsis

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: ai-story-windows-nsis
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: ai-story-windows-msi
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore
