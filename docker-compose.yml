services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_story}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_story}
      POSTGRES_DB: ${POSTGRES_DB:-ai_story}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  milvus:
    image: milvusdb/milvus:v2.4.15
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    restart: "no"

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ai_story:ai_story@postgres:5432/ai_story}
      AGENT_CHECKPOINT_BACKEND: ${AGENT_CHECKPOINT_BACKEND:-postgres}
      JWT_SECRET: ${JWT_SECRET:-local-development-secret}
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PROVIDER_API_KEY_ENCRYPTION_SECRET: ${PROVIDER_API_KEY_ENCRYPTION_SECRET:-local-provider-key-secret}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - milvus
      - ollama

  web:
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
        VITE_OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
        VITE_OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  milvus_data:
  ollama_data:
